<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReviewGuard — Trusted Product Reviews Only</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: system-ui, -apple-system, sans-serif; } </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-8">
    <header class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-600 mb-2">ReviewGuard <span class="text-xl text-gray-400">v1.6</span></h1>
      <p class="text-xl text-gray-600">Search only the most trusted expert review sites.<br>No scams. No affiliate funnels. Just real buying advice.</p>
    </header>

    <div id="apiSetup" class="mb-8 p-6 bg-white rounded-3xl border border-gray-200">
      <h3 class="font-semibold mb-3">Paste your Serper.dev API key to get started</h3>
      <div class="flex gap-3">
        <input id="apiKeyInput" type="password" placeholder="serper_xxxxxxxxxxxxxxxxxxxxxxxxxxxx" 
               class="flex-1 px-4 py-3 border border-gray-300 rounded-2xl focus:border-emerald-500 focus:outline-none">
        <button onclick="saveApiKey()" 
                class="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-medium hover:bg-emerald-700">
          Save Key
        </button>
      </div>
      <p class="text-xs text-gray-500 mt-3">Key is stored only in your browser. Never shared.</p>
    </div>

    <div class="relative mb-12">
      <input id="searchInput" type="text" placeholder="What are you shopping for? (e.g. solar bug zapper...)"
             class="w-full text-2xl p-6 pl-12 rounded-3xl border border-gray-300 focus:border-emerald-500 focus:outline-none shadow-sm">
      <button onclick="performSearch()" 
              class="absolute right-6 top-1/2 -translate-y-1/2 bg-emerald-600 text-white px-8 py-4 rounded-3xl font-medium hover:bg-emerald-700">
        Search
      </button>
    </div>

    <div id="results" class="hidden"></div>
  </div>

  <script>
    let API_KEY = localStorage.getItem('serperApiKey') || '';

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        localStorage.setItem('serperApiKey', key);
        API_KEY = key;
        alert("✅ API key saved!");
        document.getElementById('apiSetup').style.display = 'none';
      }
    }

    async function performSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      if (!API_KEY) {
        alert("Please paste your Serper API key first.");
        return;
      }

      const resultsDiv = document.getElementById('results');
      resultsDiv.classList.remove('hidden');
      resultsDiv.innerHTML = `<h2 class="text-2xl font-semibold mb-6">Searching for "<span class="text-emerald-600">${query}</span>"...</h2>`;

      try {
        const response = await fetch('https://google.serper.dev/search', {
          method: 'POST',
          headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            q: `${query} review OR best OR guide OR "buying guide"`,
            gl: 'us',
            hl: 'en',
            num: 20
          })
        });

        const data = await response.json();

        const container = document.createElement('div');
        container.className = 'space-y-6';

        if (data.organic && data.organic.length > 0) {
          data.organic.forEach(result => {
            const card = document.createElement('a');
            card.href = result.link;
            card.target = "_blank";
            card.className = "block p-6 bg-white rounded-3xl border border-gray-200 hover:border-emerald-500 hover:shadow-md transition-all";
            card.innerHTML = `
              <p class="text-emerald-600 text-sm font-medium">Result</p>
              <h3 class="text-xl font-semibold mt-1 mb-2">${result.title}</h3>
              <p class="text-gray-600 line-clamp-3">${result.snippet || ''}</p>
              <p class="text-xs text-gray-400 mt-2">${result.link}</p>
            `;
            container.appendChild(card);
          });
        } else {
          container.innerHTML = `<p class="text-gray-500">Serper returned no results.</p>`;
        }

        resultsDiv.innerHTML = `<h2 class="text-2xl font-semibold mb-2">Results for "<span class="text-emerald-600">${query}</span>"</h2>`;
        resultsDiv.appendChild(container);

      } catch (e) {
        resultsDiv.innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`;
      }
    }

    if (API_KEY) document.getElementById('apiSetup').style.display = 'none';

    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') performSearch();
    });
  </script>
</body>
</html>
