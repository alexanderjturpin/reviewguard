<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReviewGuard — Trusted Product Reviews Only</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: system-ui, -apple-system, sans-serif; } </style>
</head>
<body class="bg-gray-50 dark:bg-zinc-950 text-gray-900 dark:text-gray-100 transition-colors">
  <div class="max-w-4xl mx-auto p-8">
    <header class="flex justify-between items-start mb-10">
      <div class="text-center flex-1">
        <h1 class="text-5xl font-bold text-emerald-600 dark:text-emerald-500 mb-2">ReviewGuard <span class="text-xl text-gray-400">v2.8</span></h1>
        <p class="text-xl text-gray-600 dark:text-gray-400">Search only the most trusted expert review sites.<br>No scams. No affiliate funnels. Just real buying advice.</p>
      </div>

      <!-- Small, reliable dark mode toggle -->
      <button onclick="toggleDarkMode()" 
              class="p-2 rounded-2xl bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 hover:shadow-md transition-all text-2xl w-10 h-10 flex items-center justify-center">
        <span id="themeIcon" class="text-xl">🌙</span>
      </button>
    </header>

    <div id="apiSetup" class="mb-8 p-6 bg-white dark:bg-zinc-900 rounded-3xl border border-gray-200 dark:border-zinc-700">
      <h3 class="font-semibold mb-3">Paste your Serper.dev API key to get started</h3>
      <div class="flex gap-3">
        <input id="apiKeyInput" type="password" placeholder="serper_xxxxxxxxxxxxxxxxxxxxxxxxxxxx" 
               class="flex-1 px-4 py-3 border border-gray-300 dark:border-zinc-600 rounded-2xl focus:border-emerald-500 focus:outline-none bg-white dark:bg-zinc-800 text-gray-900 dark:text-gray-100">
        <button onclick="saveApiKey()" 
                class="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-medium hover:bg-emerald-700">
          Save Key
        </button>
      </div>
      <p class="text-xs text-gray-500 dark:text-gray-400 mt-3">Key is stored only in your browser. Never shared.</p>
    </div>

    <div class="relative mb-12">
      <input id="searchInput" type="text" placeholder="What are you shopping for? (e.g. Kindle Paperwhite 2024...)"
             class="w-full text-2xl p-6 pl-12 pr-36 rounded-3xl border border-gray-300 dark:border-zinc-600 focus:border-emerald-500 focus:outline-none shadow-sm bg-white dark:bg-zinc-900 text-gray-900 dark:text-gray-100">
      <button onclick="performSearch()" 
              class="absolute right-6 top-1/2 -translate-y-1/2 bg-emerald-600 text-white px-8 py-4 rounded-3xl font-medium hover:bg-emerald-700">
        Search
      </button>
    </div>

    <div id="results" class="hidden"></div>
  </div>

  <footer class="text-center text-xs text-gray-400 dark:text-zinc-500 mt-16 pb-8">
    ReviewGuard — Fighting review scams one search at a time ❤️
  </footer>

  <script>
    let API_KEY = localStorage.getItem('serperApiKey') || '';

    const trustedDomains = [
      "nytimes.com/wirecutter", "rtings.com", "outdoorgearlab.com",
      "consumerreports.org", "cnet.com", "thespruce.com",
      "goodhousekeeping.com", "tomsguide.com", "techradar.com", "pcmag.com",
      "theverge.com", "engadget.com", "digitaltrends.com", "laptopmag.com",
      "reviewed.com", "soundguys.com", "whatifi.com", "techhive.com"
    ];

    const siteNames = {
      "nytimes.com/wirecutter": "Wirecutter", "rtings.com": "RTINGS.com", "outdoorgearlab.com": "Outdoor Gear Lab",
      "consumerreports.org": "Consumer Reports", "cnet.com": "CNET", "thespruce.com": "The Spruce",
      "goodhousekeeping.com": "Good Housekeeping", "tomsguide.com": "Tom's Guide", "techradar.com": "TechRadar",
      "pcmag.com": "PCMag", "theverge.com": "The Verge", "engadget.com": "Engadget",
      "digitaltrends.com": "Digital Trends", "laptopmag.com": "Laptop Mag", "reviewed.com": "Reviewed",
      "soundguys.com": "SoundGuys", "whatifi.com": "What Hi-Fi?", "techhive.com": "TechHive"
    };

    const reviewKeywords = ["best", "top", "tested", "review", "reviewed", "guide", "comparison", "picks", "winners"];

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        localStorage.setItem('serperApiKey', key);
        API_KEY = key;
        alert("✅ API key saved!");
        document.getElementById('apiSetup').style.display = 'none';
      }
    }

    function getRelevanceScore(title) {
      let score = 0;
      const lower = title.toLowerCase();
      reviewKeywords.forEach(k => { if (lower.includes(k)) score += 10; });
      return score;
    }

    function getSiteName(link) {
      for (const [domain, name] of Object.entries(siteNames)) {
        if (link.includes(domain)) return name;
      }
      return "Trusted Review Site";
    }

    function toggleDarkMode() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      if (isDark) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
        document.getElementById('themeIcon').textContent = '☀️';
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
        document.getElementById('themeIcon').textContent = '🌙';
      }
    }

    function initTheme() {
      const saved = localStorage.getItem('theme');
      const html = document.documentElement;
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
        document.getElementById('themeIcon').textContent = '🌙';
      } else {
        html.classList.remove('dark');
        document.getElementById('themeIcon').textContent = '☀️';
      }
    }

    async function performSearch() {
      let query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      if (!API_KEY) {
        alert("Please paste your Serper API key first.");
        return;
      }

      const resultsDiv = document.getElementById('results');
      resultsDiv.classList.remove('hidden');
      resultsDiv.innerHTML = `
        <div class="flex items-center justify-center py-12">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-600"></div>
          <span class="ml-3 text-lg text-gray-600 dark:text-gray-400">Searching trusted review sites...</span>
        </div>
      `;

      let searchQuery = query;
      const hasReviewWord = reviewKeywords.some(k => query.toLowerCase().includes(k));
      if (!hasReviewWord && query.split(' ').length < 5) {
        searchQuery = query + " review";
      }

      try {
        const response = await fetch('https://google.serper.dev/search', {
          method: 'POST',
          headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ q: searchQuery, gl: 'us', hl: 'en', num: 30 })
        });

        const data = await response.json();

        let trustedResults = [];

        if (data.organic && data.organic.length > 0) {
          data.organic.forEach(result => {
            if (trustedDomains.some(domain => result.link.includes(domain))) {
              const score = getRelevanceScore(result.title);
              trustedResults.push({ ...result, score });
            }
          });
        }

        trustedResults.sort((a, b) => b.score - a.score);

        const container = document.createElement('div');
        container.className = 'space-y-6';

        if (trustedResults.length > 0) {
          trustedResults.forEach(result => {
            const siteName = getSiteName(result.link);
            const card = document.createElement('a');
            card.href = result.link;
            card.target = "_blank";
            card.className = "flex gap-4 p-6 bg-white dark:bg-zinc-900 rounded-3xl border border-gray-200 dark:border-zinc-700 hover:border-emerald-500 hover:shadow-md transition-all";
            const thumbnailHTML = `<div class="w-20 h-20 bg-gray-100 dark:bg-zinc-800 rounded-2xl flex-shrink-0 flex items-center justify-center text-3xl">📖</div>`;
            card.innerHTML = `
              ${thumbnailHTML}
              <div class="flex-1">
                <p class="text-emerald-600 dark:text-emerald-400 text-sm font-medium flex items-center gap-1">
                  <span class="text-lg">✓</span> ${siteName}
                </p>
                <h3 class="text-xl font-semibold mt-1 mb-2">${result.title}</h3>
                <p class="text-gray-600 dark:text-gray-400 line-clamp-4">${result.snippet || ''}</p>
              </div>
            `;
            container.appendChild(card);
          });
        }

        resultsDiv.innerHTML = `<h2 class="text-2xl font-semibold mb-2">Results for "<span class="text-emerald-600">${query}</span>"</h2>`;

        if (trustedResults.length === 0) {
          resultsDiv.innerHTML += `<p class="text-gray-500 dark:text-gray-400 mt-6">No trusted review articles found.<br>Try adding "review", "best", or "tested".</p>`;
        } else {
          resultsDiv.appendChild(container);
        }

      } catch (e) {
        resultsDiv.innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`;
      }
    }

    if (API_KEY) document.getElementById('apiSetup').style.display = 'none';
    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
    window.onload = initTheme;
  </script>
</body>
</html>
